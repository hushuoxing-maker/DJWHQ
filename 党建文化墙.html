<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月AI智能体-党建文化墙设计灵感库</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#8b1e1e;
font-family:"Microsoft YaHei",sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.agent-card{
max-width:1600px;
width:100%;
background:#fbf7f2;
border-radius:40px;
overflow:hidden;
box-shadow:0 40px 70px rgba(0,0,0,0.25);
}

.agent-header{
background:#9e2a2b;
padding:30px 50px;
color:white;
}

.agent-header h1{
font-size:34px;
}

.workspace{
display:flex;
flex-wrap:wrap;
}

.input-panel{
flex:1;
min-width:420px;
padding:40px;
background:white;
}

.input-panel h2{
font-size:28px;
margin-bottom:20px;
color:#9e2a2b;
}

.input-group{
margin-bottom:24px;
}

.input-group label{
font-weight:600;
display:block;
margin-bottom:10px;
}

.input-group input,
.input-group textarea{
width:100%;
padding:16px;
font-size:16px;
border-radius:12px;
border:2px solid #ddd;
}

.generate-btn{
width:100%;
padding:20px;
font-size:22px;
border:none;
border-radius:30px;
background:#9e2a2b;
color:white;
cursor:pointer;
margin-top:20px;
}

.output-panel{
flex:1.4;
padding:40px;
background:#f6f2ec;
max-height:900px;
overflow:auto;
}

.output-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.prompt-list{
display:flex;
flex-direction:column;
gap:16px;
}

.prompt-card{
background:white;
padding:20px;
border-radius:16px;
border:1px solid #ddd;
line-height:1.6;
position:relative;
}

.copy-btn{
position:absolute;
right:16px;
top:16px;
background:#e4c580;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

.copy-btn:hover{
background:#d5b065;
}

</style>
</head>

<body>

<div class="agent-card">

<div class="agent-header">
<h1>党建文化墙设计智能体</h1>
</div>

<div class="workspace">

<div class="input-panel">

<h2>输入党建信息</h2>

<div class="input-group">
<label>单位名称</label>
<input id="orgName" placeholder="例如：XX社区党支部">
</div>

<div class="input-group">
<label>文化主题</label>
<input id="theme" placeholder="例如：不忘初心 牢记使命">
</div>

<div class="input-group">
<label>文化内容</label>
<textarea id="content" placeholder="例如：党建文化、党员先锋、发展历程等"></textarea>
</div>

<button class="generate-btn" onclick="generatePrompts()">生成提示词</button>

</div>

<div class="output-panel">

<div class="output-header">
<h2>AI设计提示词</h2>
</div>

<div class="prompt-list" id="promptList"></div>

</div>

</div>
</div>

<script>

function generatePrompts(){

let org=document.getElementById("orgName").value
let theme=document.getElementById("theme").value
let content=document.getElementById("content").value

let list=document.getElementById("promptList")

list.innerHTML=""

for(let i=1;i<=10;i++){

let prompt=`党建文化墙设计，主题：${theme}，单位：${org}，内容包含：${content}，红色文化氛围设计，中国风党建文化墙，立体造型，金色党建元素，庄重大气，党建展厅设计，文化墙设计，3D效果图，高端党建文化空间`

let card=document.createElement("div")

card.className="prompt-card"

card.innerHTML=`

<button class="copy-btn" onclick="copyText(this)">复制</button>

${prompt}

`

list.appendChild(card)

}

}

function copyText(btn){

let text=btn.parentElement.innerText.replace("复制","")

navigator.clipboard.writeText(text)

btn.innerText="已复制"

setTimeout(()=>{

btn.innerText="复制"

},1500)

}

</script>

</body>
</html>
