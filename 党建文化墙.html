<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月智能体-党建文化墙AI设计灵感库</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:#8b1e1e;
font-family:"Microsoft YaHei",sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.agent-card{
max-width:1600px;
width:100%;
background:#fbf7f2;
border-radius:40px;
overflow:hidden;
box-shadow:0 40px 70px rgba(0,0,0,0.25);
}

.agent-header{
background:#9e2a2b;
padding:30px 50px;
color:white;
}

.agent-header h1{
font-size:34px;
}

.workspace{
display:flex;
flex-wrap:wrap;
}

.input-panel{
flex:1;
min-width:420px;
padding:40px;
background:white;
}

.input-panel h2{
font-size:28px;
margin-bottom:20px;
color:#9e2a2b;
}

.input-group{
margin-bottom:24px;
}

.input-group label{
font-weight:600;
display:block;
margin-bottom:10px;
}

.input-group input,
.input-group textarea{
width:100%;
padding:16px;
font-size:16px;
border-radius:12px;
border:2px solid #ddd;
}

.generate-btn{
width:100%;
padding:20px;
font-size:22px;
border:none;
border-radius:30px;
background:#9e2a2b;
color:white;
cursor:pointer;
margin-top:20px;
}

.output-panel{
flex:1.4;
padding:40px;
background:#f6f2ec;
max-height:900px;
overflow:auto;
}

.prompt-list{
display:flex;
flex-direction:column;
gap:18px;
}

.prompt-card{
background:white;
padding:20px;
border-radius:16px;
border:1px solid #ddd;
line-height:1.7;
position:relative;
}

.copy-btn{
position:absolute;
right:16px;
top:16px;
background:#e4c580;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

.copy-btn:hover{
background:#d5b065;
}

</style>
</head>

<body>

<div class="agent-card">

<div class="agent-header">
<h1>古月智能体-党建文化墙AI设计灵感库</h1>
</div>

<div class="workspace">

<div class="input-panel">

<h2>输入党建信息</h2>

<div class="input-group">
<label>单位名称</label>
<input id="orgName" placeholder="例如：XX社区党支部">
</div>

<div class="input-group">
<label>文化主题</label>
<input id="theme" placeholder="例如：不忘初心 牢记使命">
</div>

<div class="input-group">
<label>文化内容</label>
<textarea id="content" placeholder="例如：党员风采、发展历程、党建文化等"></textarea>
</div>

<button class="generate-btn" onclick="generatePrompts()">生成10组提示词</button>

</div>

<div class="output-panel">

<div class="prompt-list" id="promptList"></div>

</div>

</div>
</div>

<script>

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generatePrompts(){

let org=document.getElementById("orgName").value
let theme=document.getElementById("theme").value
let content=document.getElementById("content").value

let list=document.getElementById("promptList")

list.innerHTML=""

let styles=[
"红色党建文化空间设计",
"现代党建文化墙设计",
"中国风党建文化展示墙",
"红色主题文化长廊设计",
"党建展厅空间设计"
]

let materials=[
"金属立体字",
"亚克力发光字",
"浮雕雕刻墙面",
"木饰面背景墙",
"金色金属装饰"
]

let lights=[
"暖色灯带氛围",
"隐藏式灯光",
"线性灯光设计",
"射灯重点照明",
"灯带轮廓光"
]

let layout=[
"中心对称构图",
"空间层次设计",
"立体结构墙面",
"展厅式布局",
"文化长廊布局"
]

let spaces=[
"党建展厅",
"企业党建空间",
"社区党建文化墙",
"学校党建文化走廊",
"机关党建展示区"
]

for(let i=0;i<10;i++){

let prompt=`${spaces[i%spaces.length]}，主题：${theme}，单位：${org}，内容包含：${content}，${random(styles)}，${random(layout)}，${random(materials)}，${random(lights)}，红色文化元素，党徽元素设计，高端党建文化墙，3D效果图，高清渲染`

let card=document.createElement("div")

card.className="prompt-card"

card.innerHTML=`
<button class="copy-btn" onclick="copyText(this)">复制</button>
${prompt}
`

list.appendChild(card)

}

}

function copyText(btn){

let text=btn.parentElement.innerText.replace("复制","")

navigator.clipboard.writeText(text)

btn.innerText="已复制"

setTimeout(()=>{

btn.innerText="复制"

},1500)

}

</script>

</body>
</html>
